[package]
name = "agentctl"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
ratatui = "0.30.0"
rust-embed = "8.11.0"
sea-orm = { version = "2.0.0-rc.36", features = ["sqlx-sqlite", "runtime-tokio-rustls", "macros"] }
sea-orm-migration = { version = "2.0.0-rc.36", features = ["runtime-tokio-rustls"] }
serde = "1.0.228"
serde_json = "1.0.149"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
ureq = "3.2.0"
